version: '3.8'

services:
  backend:
    image: sigrc/backend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: sigrc-backend
    restart: unless-stopped
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-192.168.100.215}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-sigrc}
      DATABASE_URL: jdbc:postgresql://${DATABASE_HOST:-192.168.100.215}:${DATABASE_PORT:-5432}/${DATABASE_NAME:-sigrc}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:-086411421}
      JWT_SECRET: ${JWT_SECRET:-aGVsbG8gZXN0byBlcyB1biBzZWNyZXRvIHN1cGVyIHNlZ3VybyBwYXJhIHNpZ3JjIDIwMjQ=}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://192.168.100.115}
      UPLOAD_PATH: ${UPLOAD_PATH:-/data/sigrc/uploads}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - uploads_data:/data/sigrc/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  uploads_data:
