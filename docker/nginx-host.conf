# SIGRC - Configuración para nginx del HOST (servidor)
# Colocar en /etc/nginx/sites-available/sigrc y enlazar a sites-enabled
# Ajustar server_name, rutas SSL según corresponda

server {
    listen 80;
    server_name 192.168.100.116;

    # Redirección raíz a /sigrc/
    location = / {
        return 301 /sigrc/;
    }

    # Frontend (proxy al contenedor frontend)
    location /sigrc/ {
        proxy_pass http://127.0.0.1:8081/sigrc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API (proxy directo al backend)
    location /sigrc/api/ {
        rewrite ^/sigrc/api/(.*) /api/v1/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 100M;
    }

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/sigrc_access.log;
    error_log  /var/log/nginx/sigrc_error.log;
}
