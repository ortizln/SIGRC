# SIGRC - Configuración para nginx del HOST
# Ubicación: /etc/nginx/sites-available/sigrc
#
# Asume:
#   - Frontend compilado en /var/www/sigrc (ejecutar build-frontend.sh --subdir --output /var/www/sigrc)
#   - Backend en contenedor Docker expuesto en 127.0.0.1:8080

server {
    listen 80;
    server_name 192.168.100.115;

    # Raíz -> redirige a /sigrc/
    location = / {
        return 301 /sigrc/;
    }

    # Frontend - archivos estáticos
    location /sigrc/ {
        alias /var/www/sigrc/;
        try_files $uri$args $uri$args/ /sigrc/index.html;
    }

    # API - proxy al backend Docker
    location /sigrc/api/ {
        rewrite ^/sigrc/api/(.*) /api/v1/$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 100M;
    }

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/sigrc_access.log;
    error_log  /var/log/nginx/sigrc_error.log;
}
