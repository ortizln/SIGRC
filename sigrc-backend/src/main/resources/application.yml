server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: sigrc
  profiles:
    active: local
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        default_schema: sigrc
        dialect: org.hibernate.dialect.PostgreSQLDialect
        schema_management:
          create_schemas: true
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      continue-on-error: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  mail:
    host: ${MAIL_HOST:smtp.epmapa.gob.ec}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:notificaciones@epmapa.gob.ec}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:aGVsbG8gZXN0byBlcyB1biBzZWNyZXRvIHN1cGVyIHNlZ3VybyBwYXJhIHNpZ3JjIDIwMjQ=}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  upload:
    path: ${UPLOAD_PATH:/data/sigrc/uploads}
    max-size: 52428800
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:4201,http://localhost:8080,http://localhost:*}
  auditoria:
    enabled: true

logging:
  level:
    com.epmapa.sigrc: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always