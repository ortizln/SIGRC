<div class="login-container">
  <div class="login-card animate-fade-in">
    <div class="login-header">
      <div class="login-logo">S</div>
      <h1 class="fw-bold">SIGRC</h1>
      <p class="text-muted small">Sistema Institucional de Gestión<br>de Requerimientos, Cambios y Auditoría</p>
      <small class="text-muted">EPMAPA-T</small>
    </div>

    <form (ngSubmit)="login()" class="login-form" #loginForm="ngForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">
          Usuario
          <span class="help-tip ms-1" title="Nombre de usuario institucional">?</span>
        </label>
        <input #usernameModel="ngModel" [(ngModel)]="username" name="username" required
               placeholder="Ingrese su usuario" class="form-control"
               [class.is-invalid]="usernameModel.invalid && usernameModel.touched"
               autocomplete="username">
        <div class="validation-feedback" *ngIf="usernameModel.invalid && usernameModel.touched">
          Ingrese su usuario
        </div>
        <div class="form-text" *ngIf="!usernameModel.invalid || !usernameModel.touched">
          Credenciales proporcionadas por el administrador del sistema
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">
          Contraseña
          <span class="help-tip ms-1" title="Contraseña de acceso al sistema">?</span>
        </label>
        <input #passwordModel="ngModel" [(ngModel)]="password" name="password" type="password" required
               placeholder="Ingrese su contraseña" class="form-control"
               [class.is-invalid]="passwordModel.invalid && passwordModel.touched"
               autocomplete="current-password">
        <div class="validation-feedback" *ngIf="passwordModel.invalid && passwordModel.touched">
          Ingrese su contraseña
        </div>
      </div>

      <p class="text-danger small text-center mb-3 animate-fade-in" *ngIf="error">
        <span>⚠</span> {{ error }}
      </p>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" [disabled]="cargando || loginForm.invalid">
        {{ cargando ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <div class="text-center mt-3">
      <small class="text-muted">
        Usuario: <code>admin</code> · Contraseña: <code>admin</code>
      </small>
    </div>
  </div>
</div>
