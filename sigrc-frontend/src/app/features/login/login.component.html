<div class="login-container">
  <div class="login-split">
    <!-- Left: Carousel -->
    <div class="login-carousel">
      <div class="carousel-overlay"></div>
      <div class="carousel-content">
        <div class="carousel-brand">
          <div class="brand-badge">S</div>
          <h1>SIGRC</h1>
          <p>EPMAPA-T</p>
        </div>
        <div class="carousel-slides">
          <div class="carousel-slide" *ngFor="let s of slides; let i = index" [class.active]="i === slideActual">
            <div class="slide-icon"><i [class]="s.icon"></i></div>
            <h3>{{ s.title }}</h3>
            <p>{{ s.desc }}</p>
          </div>
        </div>
        <div class="carousel-dots">
          <span *ngFor="let s of slides; let i = index" class="dot" [class.active]="i === slideActual" (click)="irASlide(i)"></span>
        </div>
      </div>
    </div>

    <!-- Right: Login Form -->
    <div class="login-form-panel">
      <div class="login-form-card">
        <div class="login-header">
          <div class="login-logo">S</div>
          <h1>Bienvenido</h1>
          <p>Ingrese sus credenciales para acceder al sistema</p>
        </div>
        <form autocomplete="off" (ngSubmit)="login()" #loginForm="ngForm">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input autocomplete="off" #usernameModel="ngModel" [(ngModel)]="username" name="username" required
              placeholder="Ingrese su usuario" class="form-control form-control-lg"
              [class.is-invalid]="usernameModel.invalid && usernameModel.touched"
              autocomplete="username">
            <div class="validation-feedback" *ngIf="usernameModel.invalid && usernameModel.touched">
              Ingrese su usuario
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <div class="password-wrapper">
              <input autocomplete="off" #passwordModel="ngModel" [(ngModel)]="password" name="password"
                [type]="showPassword ? 'text' : 'password'" required
                placeholder="Ingrese su contraseña" class="form-control form-control-lg"
                [class.is-invalid]="passwordModel.invalid && passwordModel.touched"
                autocomplete="current-password">
              <button type="button" class="password-toggle" (click)="showPassword = !showPassword"
                [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
                <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
              </button>
            </div>
            <div class="validation-feedback" *ngIf="passwordModel.invalid && passwordModel.touched">
              Ingrese su contraseña
            </div>
          </div>
          <p class="text-danger small text-center mb-3 animate-fade-in" *ngIf="error">{{ error }}</p>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" [disabled]="cargando || loginForm.invalid">
            {{ cargando ? 'Ingresando...' : 'Iniciar Sesión' }}
          </button>
        </form>
        <div class="login-footer-text">
          <small>Sistema Institucional de Gestión de Requerimientos, Cambios y Auditoría</small>
        </div>
      </div>
    </div>
  </div>
</div>
