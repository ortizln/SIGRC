<div class="container-fluid px-0 animate-fade-in" style="max-width:900px;">
  <div class="d-flex justify-content-between align-items-start mb-4">
    <div class="page-header mb-0">
      <h2>Nueva Solicitud de Cambio</h2>
      <p>Registre una solicitud de cambio en el Departamento de TI</p>
    </div>
    <a routerLink="/cambios" class="btn btn-outline-secondary btn-sm">
      <i class="pi pi-arrow-left" style="font-size:0.7rem;"></i> Volver
    </a>
  </div>

  <form autocomplete="off" (ngSubmit)="guardar()" #formRef="ngForm">
    <div class="card-modern p-4">
      <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
        <i class="pi pi-info-circle" style="color:var(--primary);"></i> Información del Cambio
      </h6>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Título <span class="text-danger">*</span></label>
          <input autocomplete="off" #tituloModel="ngModel" [(ngModel)]="form.titulo" name="titulo" required maxlength="200"
                 class="form-control" placeholder="Título descriptivo del cambio"
                 [class.is-invalid]="tituloModel.invalid && tituloModel.touched">
          <div class="validation-feedback" *ngIf="tituloModel.invalid && tituloModel.touched">Ingrese el título del cambio</div>
        </div>
        <div class="col-12">
          <label class="form-label">Descripción <span class="text-danger">*</span></label>
          <textarea autocomplete="off" #descModel="ngModel" [(ngModel)]="form.descripcion" name="descripcion" required
                    class="form-control" rows="4" placeholder="Describa el cambio a realizar"
                    [class.is-invalid]="descModel.invalid && descModel.touched"></textarea>
          <div class="validation-feedback" *ngIf="descModel.invalid && descModel.touched">Ingrese la descripción del cambio</div>
        </div>
        <div class="col-12">
          <label class="form-label">Justificación <span class="text-danger">*</span></label>
          <textarea autocomplete="off" #justModel="ngModel" [(ngModel)]="form.justificacion" name="justificacion" required
                    class="form-control" rows="3" placeholder="Justifique la necesidad del cambio"
                    [class.is-invalid]="justModel.invalid && justModel.touched"></textarea>
          <div class="validation-feedback" *ngIf="justModel.invalid && justModel.touched">Ingrese la justificación del cambio</div>
        </div>
      </div>
    </div>

    <div class="card-modern p-4 mt-3">
      <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
        <i class="pi pi-tag" style="color:var(--secondary);"></i> Clasificación
      </h6>
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Tipo <span class="text-danger">*</span></label>
          <select autocomplete="off" [(ngModel)]="form.tipo" name="tipo" class="form-select">
            <option value="NORMAL">Normal</option>
            <option value="EMERGENTE">Emergente</option>
            <option value="ESTANDAR">Estándar</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Impacto <span class="text-danger">*</span></label>
          <select autocomplete="off" [(ngModel)]="form.impacto" name="impacto" class="form-select">
            <option value="BAJO">Bajo</option>
            <option value="MEDIO">Medio</option>
            <option value="ALTO">Alto</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Riesgo <span class="text-danger">*</span></label>
          <select autocomplete="off" [(ngModel)]="form.riesgo" name="riesgo" class="form-select">
            <option value="BAJO">Bajo</option>
            <option value="MEDIO">Medio</option>
            <option value="ALTO">Alto</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Sistema Afectado</label>
          <select autocomplete="off" [(ngModel)]="form.idSistema" name="idSistema" class="form-select">
            <option [ngValue]="null">Seleccione...</option>
            <option *ngFor="let s of sistemas" [value]="s.idSistema">{{ s.nombre }}</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card-modern p-4 mt-3">
      <h6 class="fw-bold mb-3 d-flex align-items-center gap-2">
        <i class="pi pi-file" style="color:var(--info);"></i> Planificación
      </h6>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Plan de Implementación</label>
          <textarea autocomplete="off" [(ngModel)]="form.planImplementacion" name="planImplementacion"
                    class="form-control" rows="3" placeholder="Pasos para implementar el cambio"></textarea>
        </div>
        <div class="col-12">
          <label class="form-label">Plan de Retorno</label>
          <textarea autocomplete="off" [(ngModel)]="form.planRetorno" name="planRetorno"
                    class="form-control" rows="3" placeholder="Pasos para revertir el cambio si es necesario"></textarea>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
      <a routerLink="/cambios" class="btn btn-outline-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary" [disabled]="cargando || formRef.invalid">
        <i class="pi pi-save" style="font-size:0.8rem;"></i>
        {{ cargando ? 'Guardando...' : 'Registrar Solicitud' }}
      </button>
    </div>
  </form>
</div>
