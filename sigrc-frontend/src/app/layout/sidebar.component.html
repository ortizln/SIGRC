<aside class="sidebar" [class.collapsed]="collapsed" [class.mobile-open]="mobileOpen">
  <div class="sidebar-overlay" (click)="mobileOpen = false"></div>

  <div class="sidebar-inner">
    <div class="sidebar-brand">
      <div class="brand-icon">S</div>
      <div class="brand-text" *ngIf="!collapsed">
        <h1>SIGRC</h1>
        <small>EPMAPA-T</small>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title" *ngIf="!collapsed">Módulos</div>
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <i class="pi pi-home sidebar-icon"></i>
        <span *ngIf="!collapsed">Dashboard</span>
      </a>
      <a routerLink="/correspondencia" routerLinkActive="active" class="nav-item">
        <i class="pi pi-inbox sidebar-icon"></i>
        <span *ngIf="!collapsed">Correspondencia</span>
      </a>
      <a routerLink="/tickets" routerLinkActive="active" class="nav-item">
        <i class="pi pi-ticket sidebar-icon"></i>
        <span *ngIf="!collapsed">Tickets</span>
      </a>
      <a routerLink="/cambios" routerLinkActive="active" class="nav-item">
        <i class="pi pi-sync sidebar-icon"></i>
        <span *ngIf="!collapsed">Cambios</span>
      </a>
      <a routerLink="/versiones" routerLinkActive="active" class="nav-item">
        <i class="pi pi-box sidebar-icon"></i>
        <span *ngIf="!collapsed">Versiones</span>
      </a>

      <div class="nav-section-title" *ngIf="!collapsed">Administración</div>
      <a routerLink="/auditoria" routerLinkActive="active" class="nav-item" *ngIf="isAdminOrAuditor()">
        <i class="pi pi-clipboard sidebar-icon"></i>
        <span *ngIf="!collapsed">Auditoría</span>
      </a>
      <a routerLink="/usuarios" routerLinkActive="active" class="nav-item" *ngIf="isAdmin()">
        <i class="pi pi-users sidebar-icon"></i>
        <span *ngIf="!collapsed">Usuarios</span>
      </a>
      <a routerLink="/roles" routerLinkActive="active" class="nav-item" *ngIf="isAdmin()">
        <i class="pi pi-shield sidebar-icon"></i>
        <span *ngIf="!collapsed">Roles</span>
      </a>
      <a routerLink="/reportes" routerLinkActive="active" class="nav-item" *ngIf="isAdminOrAuditor()">
        <i class="pi pi-chart-bar sidebar-icon"></i>
        <span *ngIf="!collapsed">Reportes</span>
      </a>

      <div class="nav-section-title" *ngIf="!collapsed">Consultas</div>
      <a routerLink="/conocimiento" routerLinkActive="active" class="nav-item">
        <i class="pi pi-book sidebar-icon"></i>
        <span *ngIf="!collapsed">Base Conocimiento</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile" *ngIf="!collapsed">
        <div class="user-avatar">{{ getInitial() }}</div>
        <div class="user-details">
          <strong class="user-name">{{ usuario?.nombres }}</strong>
          <small class="user-role">{{ usuario?.rolNombre }}</small>
        </div>
      </div>
      <div class="user-avatar-sm" *ngIf="collapsed" title="{{ usuario?.nombres }}">
        {{ getInitial() }}
      </div>
      <button class="logout-btn" (click)="logout()" title="Cerrar sesión">
        <i class="pi pi-sign-out" style="font-size:1rem;"></i>
        <span *ngIf="!collapsed">Cerrar Sesión</span>
      </button>
    </div>
  </div>
</aside>
