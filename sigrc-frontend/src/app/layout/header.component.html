<header class="app-header">
  <div class="d-flex align-items-center gap-3">
    <button class="hamburger-btn" (click)="toggleSidebar.emit()" aria-label="Toggle sidebar">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a routerLink="/dashboard" class="d-flex align-items-center gap-2 text-decoration-none">
      <div class="logo-icon">S</div>
      <div class="d-none d-sm-block">
        <h1 class="fs-6 fw-bold mb-0" style="color:var(--text-primary);letter-spacing:-0.02em;">SIGRC</h1>
        <small style="color:var(--text-muted);font-size:0.6rem;letter-spacing:0.04em;display:block;margin-top:-2px;">EPMAPA-T</small>
      </div>
    </a>
  </div>
  <div class="d-flex align-items-center gap-2">
    <div class="user-info">
      <div class="user-avatar">{{ getInitial() }}</div>
      <span class="user-name">{{ usuario?.nombres }}</span>
    </div>
    <button class="btn-icon" (click)="logout()" title="Cerrar sesión">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</header>
